# Application Configuration
spring.application.name=bihar-seva
server.port=${PORT:8080}

# MongoDB Configuration
# Use environment variables for production (Railway, etc.)
# Format: mongodb://username:password@host:port/database
#spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bihar_seva}
#spring.data.mongodb.host=${MONGODB_HOST:localhost}
#spring.data.mongodb.port=${MONGODB_PORT:27017}
#spring.data.mongodb.database=${MONGODB_DATABASE:bihar_seva}
# Set MONGODB_URI in production (Render/Railway). Local default below.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bihar_seva}
spring.data.mongodb.auto-index-creation=true

# MongoDB Connection Pool
spring.data.mongodb.options.max-connection-pool-size=100
spring.data.mongodb.options.min-connection-pool-size=5
spring.data.mongodb.options.max-connection-idle-time=60000
spring.data.mongodb.options.max-connection-life-time=120000
spring.data.mongodb.options.connect-timeout=10000
spring.data.mongodb.options.socket-timeout=0

# JWT Configuration
# IMPORTANT: Use a strong secret in production via environment variable
jwt.secret=${JWT_SECRET:biharSevaSecretKey2024ForProductionUseOnly}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.bihar.seva=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=DEBUG
logging.level.org.springframework.web=DEBUG

# Logging Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log Files
logging.file.name=logs/bihar-seva.log
logging.file.max-size=10MB
logging.file.max-history=30

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# CORS Configuration
# Use environment variable for production frontend URL
# Example: https://your-app.vercel.app,http://localhost:3000
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Rate Limiting
rate.limit.requests-per-minute=100
rate.limit.burst-capacity=200

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:suraj4881@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tlts hqdi jjuv qyyx}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



# OTP Configuration
otp.length=6
otp.expiry-minutes=5
otp.max-attempts=3

# SMS Configuration
# Currently in development mode - SMS will be logged only
# In production, integrate with SMS gateway provider (MSG91, Twilio, etc.)

# Razorpay Configuration
# Set webhook secret from Razorpay dashboard
razorpay.webhook.secret=
razorpay.key.id=
razorpay.key.secret=

# File Storage
file.upload.path=uploads/
file.upload.max-size=10485760
file.allowed-types=image/jpeg,image/png,image/gif,application/pdf

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=users,providers,bookings,kyc
